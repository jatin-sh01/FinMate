name: Build and deploy Node.js app to Azure Web App - Finmate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        working-directory: ./backend
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C07FB72CA94F4AA584DAF3BA670A03A3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D6948E0DB63C4923A1D3C3B383417F82 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_934AFEAD1F484FD583CC796CF979C246 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Finmate'
          slot-name: 'Production'
          package: ./backend
